<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="grad-purple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b57fe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9558B2;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-red" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#e65c53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CB3C33;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-green" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5cb84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode in="offsetblur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto">
      <polygon points="0 0, 4 2, 0 4" fill="#4063D8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="32" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Timeline axis -->
  <line x1="30" y1="120" x2="170" y2="120" stroke="#aaa" stroke-width="1.5"/>
  <text x="175" y="123" font-family="sans-serif" font-size="8" fill="#aaa">t</text>

  <!-- Event arrows along timeline -->
  <!-- Event 1: purple node to red node -->
  <line x1="50" y1="75" x2="50" y2="115" stroke="#9558B2" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="50" cy="70" r="8" fill="url(#grad-purple)" stroke="#fff" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Event 2: red node to green node -->
  <line x1="80" y1="75" x2="80" y2="115" stroke="#CB3C33" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="80" cy="70" r="8" fill="url(#grad-red)" stroke="#fff" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Event 3: green to purple -->
  <line x1="110" y1="75" x2="110" y2="115" stroke="#389826" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="110" cy="70" r="8" fill="url(#grad-green)" stroke="#fff" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Event 4: purple to green -->
  <line x1="140" y1="75" x2="140" y2="115" stroke="#9558B2" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="140" cy="70" r="8" fill="url(#grad-purple)" stroke="#fff" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Directed edges between events -->
  <path d="M 55 68 Q 65 50 75 68" stroke="#4063D8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 85 68 Q 95 50 105 68" stroke="#4063D8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 115 68 Q 125 50 135 68" stroke="#4063D8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Event markers on timeline -->
  <circle cx="50" cy="120" r="3" fill="#9558B2"/>
  <circle cx="80" cy="120" r="3" fill="#CB3C33"/>
  <circle cx="110" cy="120" r="3" fill="#389826"/>
  <circle cx="140" cy="120" r="3" fill="#9558B2"/>

  <!-- Text -->
  <text x="100" y="160" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="24" letter-spacing="0.5">
    <tspan fill="#9558B2">R</tspan><tspan fill="#CB3C33">e</tspan><tspan fill="#389826">l</tspan><tspan fill="#9558B2">e</tspan><tspan fill="#CB3C33">v</tspan><tspan fill="#389826">e</tspan><tspan fill="#9558B2">n</tspan><tspan fill="#CB3C33">t</tspan><tspan fill="#555">.</tspan><tspan fill="#389826">j</tspan><tspan fill="#9558B2">l</tspan>
  </text>
</svg>
